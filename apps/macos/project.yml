name: Recall
options:
  bundleIdPrefix: com.recall
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  Recall:
    type: application
    platform: macOS
    sources:
      - path: Recall
        excludes:
          - Resources/Info.plist
    resources:
      - path: Recall/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.macos
        PRODUCT_NAME: Recall
        INFOPLIST_FILE: Recall/Resources/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: NO
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets:
        - RecallTests
      gatherCoverageData: true
  RecallTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RecallTests
    dependencies:
      - target: Recall
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.macos.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
