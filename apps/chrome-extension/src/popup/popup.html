<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Save to Mema</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell" aria-label="Save to Mema">
      <header class="brand-row">
        <img
          class="brand-mark"
          src="../../assets/icons/icon32.png"
          alt=""
          width="36"
          height="36"
        />
        <div>
          <p class="eyebrow">Mema</p>
          <h1>Save this context</h1>
        </div>
        <button
          id="settings-button"
          class="settings-button"
          type="button"
          aria-label="Open Mema extension settings"
          title="Settings"
        >
          <span aria-hidden="true">&#9881;</span>
        </button>
      </header>

      <section class="source-card" aria-labelledby="source-title-label">
        <p class="section-label" id="source-title-label">Page</p>
        <div
          class="source-content"
          role="region"
          aria-label="Page title and address"
          tabindex="0"
        >
          <h2 id="page-title">Reading the active page…</h2>
          <p id="page-url" class="page-url"></p>
        </div>
      </section>

      <section class="preview-section" aria-labelledby="preview-label">
        <div class="section-heading">
          <p class="section-label" id="preview-label">Selection preview</p>
          <span id="preview-count" class="character-count"></span>
        </div>
        <p id="selection-warning" class="warning" hidden>
          No text selected; saving the page title, URL, and optional note only.
        </p>
        <pre id="selection-preview" class="selection-preview">Loading…</pre>
      </section>

      <div class="note-heading">
        <label class="note-label" for="user-note">Why are you saving this?</label>
        <span id="note-count" class="character-count">Note: 0 / 4,000 characters</span>
      </div>
      <textarea
        id="user-note"
        rows="3"
        placeholder="Optional note, situation, or caution"
        aria-describedby="note-count save-hint retry-warning"
      ></textarea>
      <div class="capture-guidance">
        <span id="save-hint"><kbd>Ctrl/⌘</kbd> + <kbd>Enter</kbd> to save</span>
        <span id="retry-warning" hidden>Retry uses the original source and note.</span>
      </div>

      <div id="status" class="status" aria-live="polite" hidden>
        <strong id="status-title"></strong>
        <span id="status-detail"></span>
      </div>

      <button id="save-button" type="button" disabled>Save</button>

    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
