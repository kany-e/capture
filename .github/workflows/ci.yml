name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            services/backend/requirements.txt
            services/backend/pyproject.toml
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check
      - name: Run backend tests
        run: python -m pytest

  backend_stress:
    name: Backend stress
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            services/backend/requirements.txt
            services/backend/pyproject.toml
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check
      - name: Run deterministic stress scenarios
        run: python tools/stress_backend.py

  chrome:
    name: Chrome extension
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/chrome-extension
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Run extension tests
        run: npm test

  macos:
    name: macOS
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
      RECALL_DERIVED_DATA_PATH: ${{ runner.temp }}/recall-derived-data
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build and run macOS tests
        run: ./scripts/test-macos.sh

  required:
    name: Required checks
    if: ${{ always() }}
    needs:
      - backend
      - backend_stress
      - chrome
      - macos
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Verify every test job passed
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          STRESS_RESULT: ${{ needs.backend_stress.result }}
          CHROME_RESULT: ${{ needs.chrome.result }}
          MACOS_RESULT: ${{ needs.macos.result }}
        run: |
          printf 'backend=%s stress=%s chrome=%s macos=%s\n' \
            "$BACKEND_RESULT" "$STRESS_RESULT" "$CHROME_RESULT" "$MACOS_RESULT"
          test "$BACKEND_RESULT" = success
          test "$STRESS_RESULT" = success
          test "$CHROME_RESULT" = success
          test "$MACOS_RESULT" = success
